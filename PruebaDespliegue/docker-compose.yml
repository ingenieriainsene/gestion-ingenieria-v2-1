version: '3.8'

# ==============================================================================
# GESTIÓN INGENIERÍA V2 - DOCKER COMPOSE (DESPLIEGUE)
# ==============================================================================
# USO:
# 1. Asegúrate de tener Docker Desktop instalado y corriendo
# 2. Ejecuta INICIAR.bat (Windows) o ./iniciar.sh (Linux/Mac)
# 3. Accede a http://localhost
# ==============================================================================

services:
  # ==========================================
  # BASE DE DATOS (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: gestion-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-gestion_ingenieria}
    ports:
      - "${DB_PORT_HOST:-54322}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/ddl_ingenieria.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestion-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND (Spring Boot)
  # ==========================================
  backend:
    image: gestion-backend:latest
    container_name: gestion-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-gestion_ingenieria}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SERVER_PORT: 8082
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - gestion-net

  # ==========================================
  # FRONTEND (Angular + Nginx)
  # ==========================================
  frontend:
    image: gestion-frontend:latest
    container_name: gestion-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - gestion-net

volumes:
  db_data:
  backend_uploads:


networks:
  gestion-net:
    driver: bridge
