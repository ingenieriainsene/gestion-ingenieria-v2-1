version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: gestion-db
    restart: always
    profiles: [ dev, full ]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-gestion_ingenieria}
    ports:
      - "${DB_PORT_HOST:-54322}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/ddl_ingenieria.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestion-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # SUPABASE AUTH (GoTrue) - Gestiona el Login
  # ==========================================
  auth:
    image: supabase/gotrue:v2.132.3
    container_name: gestion-auth
    depends_on:
      db:
        condition: service_healthy
    profiles: [ full ]
    environment:
      GOTRUE_EXTERNAL_URL: http://192.168.1.66:8000
      API_EXTERNAL_URL: http://192.168.1.66:8000
      GOTRUE_DB_DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: ${JWT_EXPIRATION_MS}
      GOTRUE_DB_MAX_POOL_SIZE: 30
      JWT_SECRET: ${JWT_SECRET}
      DB_NAME: ${DB_NAME}
    networks:
      - gestion-net

  # ==========================================
  # SUPABASE REST (PostgREST) - API para Angular
  # ==========================================
  rest:
    image: postgrest/postgrest:v11.1.0
    container_name: gestion-rest
    depends_on:
      db:
        condition: service_healthy
    profiles: [ full ]
    environment:
      PGRST_DB_URI: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PGRST_DB_SCHEMA: public
      PGRST_JWT_SECRET: ${JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      DB_NAME: ${DB_NAME}
    networks:
      - gestion-net

  # ==========================================
  # KONG (Gateway) - La puerta de entrada puerto 8000
  # ==========================================
  kong:
    image: kong:2.8.1
    container_name: gestion-kong
    profiles: [ full ]
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /app/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./supabase/volumes/api/kong.yml:/app/kong.yml
    networks:
      - gestion-net

  # ==========================================
  # BACKEND (Spring Boot)
  # ==========================================
  backend:
    build: ./backend
    container_name: gestion-backend
    restart: always
    profiles: [ full ]
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8082
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    networks:
      - gestion-net

  # ==========================================
  # FRONTEND (Angular)
  # ==========================================
  frontend:
    build: ./frontend
    container_name: gestion-frontend
    restart: always
    profiles: [ full ]
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - gestion-net

volumes:
  db_data:


networks:
  gestion-net:
    driver: bridge
