version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: gestion-db
    restart: always
    profiles: [ dev, full ]
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Ingenieria2026!}
      POSTGRES_DB: ${DB_NAME:-gestion_ingenieria}
    volumes:
      - ${DB_VOLUME_PATH:-D:/Datos/gestion_db_data}:/var/lib/postgresql/data
      - ./sql/ddl_ingenieria.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestion-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # SUPABASE AUTH (GoTrue) - Gestiona el Login
  # ==========================================
  auth:
    image: supabase/gotrue:v2.132.3
    container_name: gestion-auth
    depends_on:
      db:
        condition: service_healthy
    profiles: [ full ]
    environment:
      GOTRUE_EXTERNAL_URL: http://${SERVER_IP:-192.168.1.66}:8000
      API_EXTERNAL_URL: http://${SERVER_IP:-192.168.1.66}:8000
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${DB_PASSWORD:-Ingenieria2026!}@db:5432/${DB_NAME:-gestion_ingenieria}
      GOTRUE_SITE_URL: http://${SERVER_IP:-192.168.1.66}:8080
      GOTRUE_JWT_SECRET: InseneSolarSeguridad2026_JWT_Secret_Key_Global
    networks:
      - gestion-net

  # ==========================================
  # SUPABASE REST (PostgREST) - API para Angular
  # ==========================================
  rest:
    image: postgrest/postgrest:v11.1.0
    container_name: gestion-rest
    depends_on:
      db:
        condition: service_healthy
    profiles: [ full ]
    environment:
      PGRST_DB_URI: postgres://postgres:${DB_PASSWORD:-Ingenieria2026!}@db:5432/${DB_NAME:-gestion_ingenieria}
      PGRST_DB_SCHEMA: public
      PGRST_JWT_SECRET: InseneSolarSeguridad2026_JWT_Secret_Key_Global
    networks:
      - gestion-net

  # ==========================================
  # KONG (Gateway) - La puerta de entrada puerto 8000
  # ==========================================
  kong:
    image: kong:2.8.1
    container_name: gestion-kong
    profiles: [ full ]
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /app/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    volumes:
      - ./supabase/volumes/api/kong.yml:/app/kong.yml
    networks:
      - gestion-net

  # ==========================================
  # BACKEND (Spring Boot)
  # ==========================================
  backend:
    build: ./backend
    container_name: gestion-back
    restart: always
    profiles: [ full ]
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://gestion-db:5432/${DB_NAME:-gestion_ingenieria}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-Ingenieria2026!}
      SERVER_PORT: 8080
    ports:
      - "8082:8080"
    networks:
      - gestion-net
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'

  # ==========================================
  # DATABASE METADATA (pg-meta) - Para que Studio pueda ejecutar SQL
  # ==========================================
  meta:
    image: supabase/postgres-meta:v0.95.2
    container_name: gestion-meta
    depends_on:
      db:
        condition: service_healthy
    profiles: [ full ]
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${DB_NAME:-gestion_ingenieria}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${DB_PASSWORD:-Ingenieria2026!}
      PG_META_DB_URL: postgres://postgres:${DB_PASSWORD:-Ingenieria2026!}@db:5432/${DB_NAME:-gestion_ingenieria}?sslmode=disable
    networks:
      - gestion-net

  # ==========================================
  # DATABASE MANAGEMENT (Supabase Studio)
  # ==========================================
  studio:
    image: supabase/studio:2026.03.16-sha-5528817
    container_name: gestion-studio
    profiles: [ full ]
    ports:
      - "3001:3000"
    environment:
      API_EXTERNAL_URL: http://${SERVER_IP:-192.168.1.66}:8000
      SUPABASE_PUBLIC_URL: http://${SERVER_IP:-192.168.1.66}:3001
      SUPABASE_URL: http://kong:8000
      DB_DATABASE_URL: postgres://postgres:${DB_PASSWORD:-Ingenieria2026!}@db:5432/${DB_NAME:-gestion_ingenieria}
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Ingenieria2026!}
      POSTGRES_DB: ${DB_NAME:-gestion_ingenieria}
      AUTH_JWT_SECRET: InseneSolarSeguridad2026_JWT_Secret_Key_Global
      SUPABASE_ANON_KEY: InseneSolarSeguridad2026_JWT_Secret_Key_Global
      SUPABASE_SERVICE_KEY: InseneSolarSeguridad2026_JWT_Secret_Key_Global
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /app/functions
    volumes:
      - ./supabase/snippets:/app/snippets
      - ./supabase/functions:/app/functions
    networks:
      - gestion-net

  # ==========================================
  # FRONTEND (Angular)
  # ==========================================
  frontend:
    build: ./frontend
    container_name: gestion-front
    restart: always
    profiles: [ full ]
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - gestion-net

networks:
  gestion-net:
    driver: bridge
