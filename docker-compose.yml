version: '3.8'

services:
  # ==========================================
  # BASE DE DATOS (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: gestion-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestion_ingenieria
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/ddl_ingenieria.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestion-net

  # ==========================================
  # BACKEND (Spring Boot)
  # ==========================================
  backend:
    build: ./backend
    container_name: gestion-backend
    restart: always
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gestion_ingenieria
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8082:8082"
    networks:
      - gestion-net

  # ==========================================
  # FRONTEND (Angular + Nginx)
  # ==========================================
  frontend:
    build: ./frontend
    container_name: gestion-frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - gestion-net

volumes:
  db_data:


networks:
  gestion-net:
    driver: bridge
