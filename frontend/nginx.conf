server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────
    # REVERSE PROXY para /api → backend de Railway (RED PRIVADA)
    # ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # DNS interno de Railway
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/ {
        # proxy_pass SIN "/" al final para que mantenga el path original exactamente.
        # /api/auth/login → http://backend:8080/api/auth/login
        proxy_pass ${BACKEND_URL};
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s; 
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_buffering off;
    }

    # Registro de salud simplificado para probar resolución
    location /ping-backend {
        proxy_pass ${BACKEND_URL}/api/health;
        access_log off;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass ${BACKEND_URL}/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
