server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────
    # DIAGNÓSTICO: Log detallado para ver exactamente qué responde el backend
    # ─────────────────────────────────────────────────────────────
    log_format upstream_diag '[$time_local] $remote_addr - $server_name to: $upstream_addr: "$request" $status (Upstream: $upstream_status) RT=$request_time URT=$upstream_response_time';
    access_log /var/log/nginx/access.log upstream_diag;
    error_log /var/log/nginx/error.log warn;

    # DNS interno de Railway
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/ {
        # proxy_pass SIN "/" al final para que mantenga el path original exactamente.
        # /api/auth/login → http://backend:8080/api/auth/login
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT};
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s; 
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_buffering off;
    }

    # Registro de salud simplificado para probar resolución
    location /ping-backend {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/api/health;
        access_log off;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
