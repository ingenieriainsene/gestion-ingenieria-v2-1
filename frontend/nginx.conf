server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────
    # REVERSE PROXY para /api → backend de Railway
    # Esto elimina CORS: el browser solo habla con este nginx,
    # y nginx reenvía las peticiones al backend server-side.
    # ─────────────────────────────────────────────────────────────
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;

    location /api/ {
        proxy_pass https://gestion-ingenieria-v2-production.up.railway.app/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host gestion-ingenieria-v2-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Origin "";
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass https://gestion-ingenieria-v2-production.up.railway.app/ws;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host gestion-ingenieria-v2-production.up.railway.app;
    }

    # SPA routing — Angular maneja las rutas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos (JS, CSS, imágenes, fuentes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sin caché para index.html (para que se cargue la última versión)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
