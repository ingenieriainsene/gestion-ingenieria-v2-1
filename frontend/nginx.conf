server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────
    # REVERSE PROXY para /api → backend de Railway (RED PRIVADA)
    # ─────────────────────────────────────────────────────────────
    
    # DNS interno de Railway para resolución dinámica (forzamos IPv4)
    resolver 127.0.0.11 ipv6=off valid=10s;

    location /api/ {
        # Usamos variables para forzar resolución DNS en cada petición si es necesario
        set $backend_target http://${BACKEND_HOST}:${BACKEND_PORT};
        
        proxy_pass $backend_target/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Preferencias de conexión
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Optimized Timeout settings for Railway
        proxy_connect_timeout 60s; 
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        
        # Manejo de errores para diagnóstico
        proxy_intercept_errors on;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA routing — Angular maneja las rutas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sin caché para index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
