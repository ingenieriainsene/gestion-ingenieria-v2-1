<div class="doc-wrapper">
  <div class="doc-header">
    <h1>Gestor Documental</h1>
    <p>Entidad: <strong>{{ entidadTipo }} #{{ entidadId }}</strong></p>
  </div>

  <div
    class="dropzone"
    [class.dragging]="isDragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <div class="dropzone-content">
      <strong>Arrastra y suelta archivos aquí</strong>
      <span>o</span>
      <label class="btn-upload">
        Seleccionar archivos
        <input type="file" multiple (change)="onFileSelected($event)" />
      </label>
    </div>
  </div>

  <div class="doc-list">
    <div *ngIf="loading" class="empty-state">Cargando archivos...</div>
    <div *ngIf="!loading && archivos.length === 0" class="empty-state">No hay archivos adjuntos.</div>

    <div *ngFor="let a of archivos" class="doc-item">
      <div class="doc-info">
        <div class="doc-name">{{ a.nombreOriginal }}</div>
        <div class="doc-meta">
          <span>{{ formatSize(a.tamanoBytes) }}</span>
          <span>{{ a.fechaCreacion | date:'dd/MM/yyyy HH:mm' }}</span>
          <span>{{ a.tipoMime || 'application/octet-stream' }}</span>
        </div>
      </div>
      <div class="doc-actions">
        <button type="button" class="btn-action" (click)="verArchivo(a)">Ver</button>
        <button type="button" class="btn-action" (click)="descargarArchivo(a)">⬇️ Descargar</button>
        <button type="button" class="btn-danger" (click)="eliminarArchivo(a)">🗑️ Eliminar</button>
      </div>
    </div>
  </div>
</div>
