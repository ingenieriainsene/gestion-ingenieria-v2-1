<canvas #canvas id="canvas" (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()"></canvas>

<div class="main-wrapper">
    <div class="login-card-container"> <!-- Contenedor para la levitación anti-gravedad -->
        <div class="plasma-halo"></div> <!-- Halo de energía solar plasma -->
        <div class="login-card">
            <div class="card-header">
                <div class="logo-container">
                    <img src="assets/logo-insene.png" alt="Insene Energía" class="login-logo">
                </div>
                <h3>GESTIÓN INSENE</h3>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" formControlName="username" placeholder="USUARIO" required id="username">
                    <div class="baseline"></div>
                </div>

                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" formControlName="password" placeholder="CONTRASEÑA" required id="password">
                    <div class="baseline"></div>
                </div>

                <button type="submit" [disabled]="loginForm.invalid">
                    <span class="btn-text">ENTRAR AL SISTEMA</span>
                </button>
            </form>

            <div class="card-footer">
                <p>© 2026 INSENE SOLAR - TODOS LOS DERECHOS RESERVADOS</p>
            </div>
        </div>
        <div class="mag-suspension-base"></div> <!-- Base de suspensión magnética visible -->
    </div>
</div>
