# ======================================================
# CONFIGURACIÓN PRINCIPAL - GESTIÓN INGENIERÍA BACKEND
# ======================================================

spring.application.name=gestion-backend

# ======================================================
# CONFIGURACIÓN DE BASE DE DATOS
# ======================================================
# Configuración por defecto para Docker con PostgreSQL/Supabase.
# PARA CAMBIAR EL PUERTO (ej. Oficina vs Casa), EDITA EL ARCHIVO .env EN LA RAIZ DEL PROYECTO.
# Las variables de entorno de .env (cargadas por Docker) sobrescribirán esto.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.maximum-pool-size=10

# ======================================================
# CONFIGURACIÓN JPA / HIBERNATE
# ======================================================

# update: actualiza el schema automáticamente (desarrollo/docker)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# ======================================================
# CONFIGURACIÓN DE ZONA HORARIA
# ======================================================

spring.jackson.time-zone=Europe/Madrid

# ======================================================
# CONFIGURACIÓN JWT
# ======================================================

app.jwt.secret=${JWT_SECRET:super-secret-jwt-token-with-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ======================================================
# CONFIGURACIÓN DEL SERVIDOR
# ======================================================

server.port=${SERVER_PORT:8082}

# ======================================================
# CONFIGURACIÓN DE SUBIDA DE ARCHIVOS
# ======================================================

app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# ======================================================
# SEEDERS DE DATOS
# ======================================================

# Crear/actualizar usuario admin (jefe_admin / admin123)
app.seed.admin=${SEED_ADMIN:true}

# Crear datos de demostración (solo si la BD está vacía)
app.seed.demo=${SEED_DEMO:true}
