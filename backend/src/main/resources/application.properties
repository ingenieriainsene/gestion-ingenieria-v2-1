app.seed.admin=true
app.seed.demo=true
spring.application.name=gestion-backend
# Optimización de Rendimiento (Eager para evitar timeouts en arranque)
spring.main.lazy-initialization=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.format_sql=false

# URL de conexión (Prioridad: Variable de entorno > Default local Supabase Docker)
# Para usar Supabase localmente, el puerto suele ser 54322 y la base de datos 'postgres'
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:54322/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Optimization for Production/Local
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=InseneHikariPool
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=10000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jackson.time-zone=Europe/Madrid
app.jwt.secret=${JWT_SECRET:super-secret-jwt-token-with-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
server.address=0.0.0.0
server.port=${PORT:8080}
app.file.upload-dir=${APP_STORAGE_LOCATION:/app/uploads}

# Gestor documental (Linux/Railway compatible)
app.storage.location=${APP_STORAGE_LOCATION:/app/uploads}
app.storage.root=${STORAGE_PATH:/app/archivos}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Retención de registros de auditoría de sesiones (en días)
# Usado por AuditRetentionCleanupTask
audit.retention.days=90

# Clave de MapTiler para la Memoria de Legalización (mapas satélite)
# Sustituye XXXXX por tu API Key válida de MapTiler
maptiler.api-key=jgrMr1rm4l8EjYYpkaPd
