spring.application.name=gestion-backend

# --- DATABASE CONFIGURATION (SUPABASE LOCAL) ---
# Cambiado de MySQL (3307) a Supabase Postgres (54322)
# Nota: La base de datos por defecto en Supabase es 'postgres'
spring.datasource.url=jdbc:postgresql://127.0.0.1:54322/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Es vital especificar el dialecto de PostgreSQL para evitar errores de SQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- APP SPECIFIC (JWT) ---
app.jwt.secret=9a4f2c8d3b7e1f0g2h5j8k9l0m1n4o7p2q5r8s1t4u7v0w3x6y9z
app.jwt.expiration-ms=86400000

# --- SERVER ---
server.port=8081

# --- FILE UPLOAD ---
app.file.upload-dir=uploads