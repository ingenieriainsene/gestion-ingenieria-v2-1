app.seed.admin=true
app.seed.demo=true
spring.application.name=gestion-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.maximum-pool-size=10
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jackson.time-zone=Europe/Madrid
app.jwt.secret=${JWT_SECRET:super-secret-jwt-token-with-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
server.address=0.0.0.0
server.port=${BACKEND_PORT:8082}
# server.port=${BACKEND_PORT:${PORT:8082}}
app.file.upload-dir=${APP_STORAGE_LOCATION:C:/ERP_Documentos}

# Gestor documental (Windows Server)
app.storage.location=${APP_STORAGE_LOCATION:C:/ERP_Documentos}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Retención de registros de auditoría de sesiones (en días)
# Usado por AuditRetentionCleanupTask
audit.retention.days=90

# Clave de MapTiler para la Memoria de Legalización (mapas satélite)
