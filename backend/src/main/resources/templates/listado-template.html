<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${titulo}">Listado</title>
    <style>
        @page {
            size: A4 landscape;
            margin: 20mm;
        }
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 10px;
            color: #334155;
            margin: 0;
            padding: 0;
        }
        .header {
            width: 100%;
            margin-bottom: 20px;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 10px;
        }
        .logo {
            max-width: 180px;
            max-height: 60px;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
            text-transform: uppercase;
        }
        .company-info {
            text-align: right;
            font-size: 9px;
            color: #64748b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            background-color: #1e293b;
            color: #ffffff;
            text-align: left;
            padding: 8px;
            font-weight: bold;
            border: 1px solid #1e293b;
        }
        td {
            padding: 6px 8px;
            border: 1px solid #e2e8f0;
            vertical-align: top;
        }
        tr:nth-child(even) {
            background-color: #f8fafc;
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 8px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <table style="border: none; margin: 0;">
            <tr style="background: transparent;">
                <td style="border: none; width: 50%;">
                    <div th:if="${logoBase64 != null}">
                        <img th:src="'data:image/png;base64,' + ${logoBase64}" class="logo" alt="Logo" />
                    </div>
                </td>
                <td style="border: none; width: 50%; text-align: right;">
                    <div class="title" th:text="${titulo}">INFORME DE GESTIÓN</div>
                    <div class="company-info">
                        <strong>INSENE SOLAR S.L.U</strong><br/>
                        Generado el: <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <table>
        <thead>
            <tr>
                <th th:each="header : ${headers}" th:text="${header}">Cabecera</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${rows}">
                <td th:each="cell : ${row}" th:text="${cell}">Dato</td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        Este documento es un extracto informativo del sistema de gestión de INSENE SOLAR S.L.U.
    </div>
</body>
</html>
