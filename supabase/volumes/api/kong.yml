_format_version: "1.1"

services:
  # Ruta para la Autenticación (GoTrue)
  - name: auth
    url: http://gestion-auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1

  # Ruta para la API de la Base de Datos (PostgREST)
  - name: rest
    url: http://gestion-rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1

  # Ruta para el Backend (Spring Boot)
  - name: backend
    url: http://backend:8080
    routes:
      - name: backend-route
        strip_path: false
        paths:
          - /api

plugins:
  - name: cors
    config:
      origins:
        - http://192.168.1.66:8080
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Content-Range
        - X-Total-Count
      max_age: 3600
      credentials: true
