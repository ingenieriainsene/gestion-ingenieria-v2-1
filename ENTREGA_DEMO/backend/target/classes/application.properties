# ======================================================
# CONFIGURACIÓN PRINCIPAL - GESTIÓN INGENIERÍA BACKEND
# ======================================================

spring.application.name=gestion-backend

# ======================================================
# CONFIGURACIÓN DE BASE DE DATOS
# ======================================================
# Configuración por defecto para Docker con PostgreSQL/Supabase
# Las variables de entorno sobrescribirán estos valores

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/gestion_ingenieria}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# ======================================================
# CONFIGURACIÓN JPA / HIBERNATE
# ======================================================

# validate: verifica que el schema coincida (producción)
# update: actualiza el schema automáticamente (desarrollo/docker)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid

# ======================================================
# CONFIGURACIÓN DE ZONA HORARIA
# ======================================================

spring.jackson.time-zone=Europe/Madrid

# ======================================================
# CONFIGURACIÓN JWT
# ======================================================

app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7e1f0g2h5j8k9l0m1n4o7p2q5r8s1t4u7v0w3x6y9z}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ======================================================
# CONFIGURACIÓN DEL SERVIDOR
# ======================================================

server.port=${SERVER_PORT:8082}

# ======================================================
# CONFIGURACIÓN DE SUBIDA DE ARCHIVOS
# ======================================================

app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# ======================================================
# SEEDERS DE DATOS
# ======================================================

# Crear/actualizar usuario admin (jefe_admin / admin123)
app.seed.admin=${SEED_ADMIN:true}

# Crear datos de demostración (solo si la BD está vacía)
app.seed.demo=${SEED_DEMO:false}
