<canvas #canvas id="canvas"></canvas>

<div class="main-wrapper">
    <div class="login-card">
        <div class="card-header">
            <h3>GESTIÓN DE<br>INGENIERÍA</h3>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="username">USUARIO</label>
                <input id="username" type="text" formControlName="username" placeholder="Introduce tu usuario">
            </div>

            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <input id="password" type="password" formControlName="password" placeholder="••••••••">
            </div>

            <button type="submit" [disabled]="loginForm.invalid">ENTRAR AL SISTEMA</button>
        </form>

        <div class="card-footer">
            <p>© 2026 INSENE SOLAR - TODOS LOS DERECHOS RESERVADOS</p>
        </div>
    </div>
</div>
